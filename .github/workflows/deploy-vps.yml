name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm" && [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            export PATH="$HOME/.local/share/pnpm:$PATH"
            cd /var/www/ting
            git pull origin main
            pnpm install --frozen-lockfile
            pnpm --filter @ting/shared build
            pnpm --filter @ting/server exec prisma generate
            pnpm --filter @ting/server exec prisma migrate deploy
            pnpm --filter @ting/server build
            pnpm --filter @ting/client build
            pm2 startOrRestart ecosystem.config.js --env production || pm2 start ecosystem.config.js
