# fly.toml app configuration file generated for ting-hpv on 2026-03-16T17:35:04+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ting-hpv'
primary_region = 'ams'

[build]

[deploy]
  release_command = 'cd packages/server && npx prisma migrate deploy'

[env]
  NODE_ENV = 'production'
  PORT = '8080'

[[mounts]]
  source = 'ting_data'
  destination = '/data'
  initial_size = '1gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
